# Atari 2600 / VCS 4K cartridge linker configuration.
#
# This models the conventional unbanked 4K cartridge layout at $F000-$FFFF.
# The VCS only has 128 bytes of RIOT RAM, so CODE/RODATA/STARTUP live in ROM,
# ZEROPAGE/BSS/DATA share the $80-$FF RAM window, and the CPU stack uses the
# mirrored $0180-$01FF page-1 RAM window.

MEMORY {
    RAM:      start = $0080, size = $0080, type = rw, define = yes;
    CPUSTACK: start = $0180, size = $0080, type = rw, define = yes;
    ROM:      start = $F000, size = $0FFA, file = %O, fill = yes, fillval = $FF, define = yes;
    VECTORS:  start = $FFFA, size = $0006, file = %O, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = RAM,      type = zp,   define = yes;
    DATA:     load = ROM, run = RAM,      type = data, define = yes;
    BSS:      load = RAM,      type = bss,  define = yes;
    ARGSTACK: load = CPUSTACK, type = bss,  define = yes;
    STARTUP:  load = ROM,      type = ro,   define = yes;
    CODE:     load = ROM,      type = ro,   define = yes;
    RODATA:   load = ROM,      type = ro,   define = yes;
    VECTORS:  load = VECTORS,  type = ro,   start = $FFFA;
}

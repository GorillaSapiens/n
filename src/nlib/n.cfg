MEMORY {
    ZP:     start = $0000, size = $0100, type = rw, define = yes;
    HS:     start = $0100, size = $0100, type = rw, define = yes;
    RAM:    start = $0200, size = $7E00, type = rw, define = yes;
    CODE:   start = $8000, size = $7FFA, file = %O, define = yes;
    VECTORS: start = $FFFA, size = $0006, file = %O, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP, type = zp;
    STARTUP:  load = CODE, type = ro;
    CODE:     load = CODE, type = ro;
    VECTORS:  load = VECTORS, type = ro, start = $FFFA;
}


MEMORY {
    ZP:     start = $0000, size = $0100, type = rw;
    RAM:    start = $0200, size = $5E00, type = rw;
    CODE:   start = $8000, size = $8000, type = ro, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP, type = zp;
    BSS:      load = RAM, type = bss;
    CODE:     load = CODE, type = ro;
}
